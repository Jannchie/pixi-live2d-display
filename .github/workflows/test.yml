name: Test CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - "docs/**"
      - "playground/**"
      - "*.md"
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: "pnpm"

      - name: Cache core files
        uses: actions/cache@v4
        id: cache-core
        with:
          path: |
            core/*
            !core/live2d.d.ts
          key: ${{ hashFiles('scripts/setup.js') }}

      - run: pnpm install --frozen-lockfile

      - name: Set up core files
        if: steps.cache-core.outputs.cache-hit != 'true'
        run: |
          echo Cache miss: ${{ hashFiles('scripts/setup.js') }}
          pnpm run setup

      - run: pnpm run type
      - run: pnpm run build

      - name: Run tests
        run: xvfb-run --auto-servernum pnpm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: diff-images
          path: test/**/__image_snapshots__/__diff_output__/*
          if-no-files-found: ignore
